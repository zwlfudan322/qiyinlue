          "序-1": "通志卷三十六·宋右廸功郎鄭樵漁仲撰\n\n七音略第一\n七音序\n\n天地之大，其用在坎離。人之為靈，其用在耳目。人與禽獸，視聽一也。聖人制律，所以導耳之聰，制字所以擴目之明，耳目根于心，聰明發於外，上智下愚，自此分矣。雖曰皇頡制字，伶倫制律，歴代相承，未聞其書。漢人課籕隸，始為字書，以通文字之學。江左競風騷，始為韻書，以通聲音之學。然漢儒識文字而不識子母，則失制字之旨。江左之儒，識四聲而不識七音，則失立韻之源。獨體為文，合體為字。漢儒知以説文解字，而不知文有子母。生字為母，從母為子。子母不分，所以失制字之旨。四聲為經，七音為緯。江左之儒，知縱有平、上，去入為四聲，而不知衡有宮，商、角、徵、羽、半徵、半商為七音，縱成經，衡成緯，經緯不交，所以失立韻之源。七音之韻，起自西域，流入諸夏，梵僧欲以其教傳之天下，故為此書，雖重百譯之遠，一字不通之處，而音義可傳，華僧從而定之，以三十六為之母，重輕清濁，不失其倫，天地萬物之音，備於此矣，雖鶴唳",

      if (selectedValue && imagePaths.hasOwnProperty('七音略') && imagePaths['七音略'].hasOwnProperty(selectedValue)) {
        const paths = imagePaths['七音略'][selectedValue];
        imageDisplay.src = paths[0]; // Assuming one image per selection for simplicity
      } else {
        imageDisplay.src = '';
      }
    }

    function filterBySearch(searchTerm) {
      const tableBody = document.querySelector('#myTable tbody');
      const rows = tableBody.getElementsByTagName('tr');
      for (let i = 0; i < rows.length; i++) {
        const cells = rows[i].getElementsByTagName('td');
        let found = false;
        for (let j = 4; j < cells.length; j++) {
          const cell = cells[j];
          if (cell.textContent.toLowerCase().includes(searchTerm.toLowerCase())) {
            found = true;
            break;
          }
        }
        if (found) {
          rows[i].style.display = '';
        } else {
          rows[i].style.display = 'none';
        }
      }
      updateStats();
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      return response.json();
    }

    function findComparisonData(character, comparisonData) {
      return comparisonData.filter(entry => entry.字 === character);
    }

    function createTableRow(rowData, comparisonData, rowIndex) {
      const row = document.createElement('tr');
      Object.entries(rowData).slice(1).forEach(([key, value], index) => {
        const cell = document.createElement('td');
        if (value) {
          const comparisonEntries = findComparisonData(value, comparisonData);
          let isMatch = false;
          let tooltipContent = '';
          for (const comparisonEntry of comparisonEntries) {
            if (comparisonKey === '聲紐') {
              if (comparisonEntry.聲紐 === key) {
                isMatch = true;
              }
            } else if (comparisonKey === '韻目') {
              if (comparisonEntry.韻目 === rowData.韻目) {
                isMatch = true;
              }
            } else {
              if (comparisonEntry[comparisonKey] === rowData[comparisonKey]) {
                isMatch = true;
              }
            }
            tooltipContent += `<p>${JSON.stringify(comparisonEntry)}</p>`;
          }
          cell.textContent = value;
          if (index < 4) {
            cell.className = '';
          } else if (comparisonEntries.length > 0) {
            cell.className = isMatch ? 'match' : 'mismatch';
          } else {
            cell.className = 'not-found';
          }
          cell.setAttribute('data-tooltip', tooltipContent);
        } else {
          cell.textContent = '';
          cell.className = '';
        }
        row.appendChild(cell);
      });
      if ((rowIndex + 1) % 4 === 0) {
        row.classList.add('bold-bottom-border');
      }
      return row;
    }

    async function loadData(filterValue) {
      const compareNone = document.getElementById('compareNone').checked;
      const compareGuangyun = document.getElementById('compareGuangyun').checked;
      const compareJiyun = document.getElementById('compareJiyun').checked;
      const compareZhongyuan = document.getElementById('compareZhongyuan').checked;
      const compareWuyin = document.getElementById('compareWuyin').checked;

      const table1Data = await fetchJson('table-2-2.json');

      if (compareGuangyun) {
        comparisonData = await fetchJson('guangyun.json');
      } else if (compareJiyun) {
        comparisonData = await fetchJson('jiyun.json');
      } else if (compareZhongyuan) {
        comparisonData = await fetchJson('zhongyuanyinyun.json');
      } else if (compareWuyin) {
        comparisonData = await fetchJson('wuyinjiyun.json');
      } else {
        comparisonData = [];
      }

      const resultsBody = document.querySelector('#myTable tbody');
      resultsBody.innerHTML = '';

      table1Data
        .filter(rowData => !filterValue || rowData['圖名'] === filterValue)
        .forEach((rowData, index) => {
          const row = createTableRow(rowData, comparisonData, index);
          resultsBody.appendChild(row);
        });

      const uniqueValues = new Set(table1Data.map(row => row['圖名']));
      filterSelect.innerHTML = '<option value="">All</option>';
      uniqueValues.forEach(value => {
        const option = document.createElement('option');
        option.textContent = value;
        option.value = value;
        filterSelect.appendChild(option);
      });

      if (filterValue) {
        filterSelect.value = filterValue;
      }

      addTooltipEvents();
      updateStats();
      updatePieChart();
    }

    function addTooltipEvents() {
      const cells = document.querySelectorAll('#myTable td');
      cells.forEach(cell => {
        cell.addEventListener('mouseenter', function (event) {
          const tooltipContent = this.getAttribute('data-tooltip');
          if (tooltipContent) {
            tooltip.innerHTML = tooltipContent;
            tooltip.style.left = `${event.pageX + 10}px`;
            tooltip.style.top = `${event.pageY + 10}px`;
            tooltip.style.display = 'block';
          }
        });

        cell.addEventListener('mouseleave', function () {
          tooltip.style.display = 'none';
        });
      });
    }

    document.getElementById('compareNone').addEventListener('change', () => {
      document.getElementById('detailComparison').style.display = 'none';
      loadData(filterSelect.value);
    });

    document.getElementById('compareGuangyun').addEventListener('change', () => {
      document.getElementById('detailComparison').style.display = 'flex';
      loadData(filterSelect.value);
    });

    document.getElementById('compareJiyun').addEventListener('change', () => {
      document.getElementById('detailComparison').style.display = 'flex';
      loadData(filterSelect.value);
    });

    document.getElementById('compareZhongyuan').addEventListener('change', () => {
      document.getElementById('detailComparison').style.display = 'flex';
      loadData(filterSelect.value);
    });

    document.getElementById('compareWuyin').addEventListener('change', () => {
      document.getElementById('detailComparison').style.display = 'flex';
      loadData(filterSelect.value);
    });

    document.getElementsByName('detail').forEach(radio => {
      radio.addEventListener('change', () => {
        comparisonKey = radio.value;
        loadData(filterSelect.value);
      });
    });

    searchInput.addEventListener('input', function () {
      const searchTerm = this.value.trim();
      filterBySearch(searchTerm);
    });

    // Function to count and display the number of colored texts
    function updateStats() {
      const greenCount = Array.from(document.querySelectorAll('#myTable td.match')).filter(cell => cell.textContent.trim() !== '').length;
      const redCount = Array.from(document.querySelectorAll('#myTable td.mismatch')).filter(cell => cell.textContent.trim() !== '').length;
      const blackCount = Array.from(document.querySelectorAll('#myTable td.not-found')).filter(cell => cell.textContent.trim() !== '').length;
      const totalCount = greenCount + redCount + blackCount;

      document.getElementById('greenCount').innerText = greenCount;
      document.getElementById('redCount').innerText = redCount;
      document.getElementById('blackCount').innerText = blackCount;

      document.getElementById('greenPercentage').innerText = ((greenCount / totalCount) * 100).toFixed(2);
      document.getElementById('redPercentage').innerText = ((redCount / totalCount) * 100).toFixed(2);
      document.getElementById('blackPercentage').innerText = ((blackCount / totalCount) * 100).toFixed(2);

      updatePieChart();
    }

    // Function to highlight specific color cells
    function highlightColor(color) {
      const cells = document.querySelectorAll('#myTable td');
      cells.forEach(cell => {
        cell.style.backgroundColor = '';
      });
      if (color === 'green') {
        document.querySelectorAll('#myTable td.match').forEach(cell => {
          cell.style.backgroundColor = '#90EE90';
        });
      } else if (color === 'red') {
        document.querySelectorAll('#myTable td.mismatch').forEach(cell => {
          cell.style.backgroundColor = '#FFB6C1';
        });
      } else if (color === 'black') {
        document.querySelectorAll('#myTable td.not-found').forEach(cell => {
          cell.style.backgroundColor = '#D3D3D3';
        });
      }
    }

    // Function to update pie chart
    function updatePieChart() {
      const greenCount = parseInt(document.getElementById('greenCount').innerText);
      const redCount = parseInt(document.getElementById('redCount').innerText);
      const blackCount = parseInt(document.getElementById('blackCount').innerText);

      const data = {
        labels: ['绿色字数', '红色字数', '黑色字数'],
        datasets: [{
          data: [greenCount, redCount, blackCount],
          backgroundColor: ['#90EE90', '#FFB6C1', '#D3D3D3'],
        }],
      };

      if (pieChart) {
        pieChart.destroy();
      }

      pieChart = new Chart(pieChartCanvas, {
        type: 'pie',
        data: data,
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: true,
              position: 'top',
            },
            tooltip: {
              callbacks: {
                label: function (tooltipItem) {
                  const value = tooltipItem.raw;
                  const total = data.datasets[0].data.reduce((acc, val) => acc + val, 0);
                  const percentage = ((value / total) * 100).toFixed(2);
                  return `${value} (${percentage}%)`;
                },
              },
            },
          },
          onHover: function (event, elements) {
            if (elements.length > 0) {
              const index = elements[0].index;
              const label = data.labels[index];
              highlightColor(label === '绿色字数' ? 'green' : label === '红色字数' ? 'red' : 'black');
            } else {
              highlightColor(null);
            }
          },
        },
      });
    }

    fetch('table-2-2.json')
      .then(response => response.json())
      .then(data => {
        const tableBody = document.querySelector('#myTable tbody');
        const filterSelect = document.getElementById('filterSelect');

        const uniqueValues = new Set(data.map(row => row['圖名']));
        uniqueValues.forEach(value => {
          const option = document.createElement('option');
          option.textContent = value;
          option.value = value;
          filterSelect.appendChild(option);
        });

        const filteredData = data.slice(0);
        filteredData.forEach(rowData => {
          const row = document.createElement('tr');
          Object.entries(rowData).slice(1).forEach(([key, value]) => {
            const cell = document.createElement('td');
            cell.textContent = value;
            row.appendChild(cell);
          });
          tableBody.appendChild(row);
        });

        filterSelect.addEventListener('change', function () {
          const selectedValue = this.value;
          loadData(selectedValue);
        });

        addTooltipEvents();
        setFiltersFromParams();
        updateStats();
      })
      .catch(error => console.error('Error fetching JSON:', error));

    function getQueryParams() {
      const params = {};
      const queryString = window.location.search.substring(1);
      const queryArray = queryString.split('&');
      queryArray.forEach(param => {
        const [key, value] = param.split('=');
        params[key] = decodeURIComponent(value);
      });
      return params;
    }

    function setFiltersFromParams() {
      const params = getQueryParams();
      if (params.comparison) {
        document.getElementById(params.comparison).checked = true;
        if (params.comparison !== 'compareNone') {
          document.getElementById('detailComparison').style.display = 'flex';
        }
      }
      if (params.detail) {
        document.querySelector(`input[name="detail"][value="${params.detail}"]`).checked = true;
      }
      if (params.filterShe) {
        filterSelect.value = params.filterShe;
      }
      loadData(filterSelect.value);
    }
  </script>
</body>
